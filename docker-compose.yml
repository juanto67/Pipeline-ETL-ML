services:

  postgres:
    image: postgres:15
    container_name: etl_postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/database/postgres_backup_20260309_205629.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: cloudbeaver
    ports:
      - "8080:8978"
  airflow:
    build: .
    image: pipeline-etl-ml:latest
    container_name: airflow
    command: standalone
    depends_on:
      - postgres
    env_file:
      - .env
    volumes:
      - airflow_logs:/opt/airflow/logs
      - airflow_plugins:/opt/airflow/plugins
    ports:
      - "8081:8080"
    restart: unless-stopped

volumes: 
  postgres_data:
  airflow_logs:
  airflow_plugins:
